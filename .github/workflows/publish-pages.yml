name: Publish to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-github-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PAGES_PUBLISH_TOKEN: ${{ secrets.PAGES_PUBLISH_TOKEN }}
    steps:
      - name: Check out app source
        uses: actions/checkout@v4

      - name: Skip until publish token is configured
        if: env.PAGES_PUBLISH_TOKEN == ''
        run: echo "PAGES_PUBLISH_TOKEN is not configured; skipping publish."

      - name: Check out GitHub Pages repo
        if: env.PAGES_PUBLISH_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: wheilala/wheilala.github.io
          token: ${{ env.PAGES_PUBLISH_TOKEN }}
          path: pages

      - name: Copy static app into Pages repo
        if: env.PAGES_PUBLISH_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          rm -rf pages/app-gametracker
          mkdir -p pages/app-gametracker
          cp index.html app.js styles.css manifest.webmanifest service-worker.js supabase-config.js soccer-fav.png pages/app-gametracker/

      - name: Commit and push published app
        if: env.PAGES_PUBLISH_TOKEN != ''
        shell: bash
        working-directory: pages
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app-gametracker
          if git diff --cached --quiet; then
            echo "No published changes to commit."
            exit 0
          fi
          git commit -m "Publish app-gametracker from $GITHUB_SHA"
          git push
